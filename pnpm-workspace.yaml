engineStrict: true
preferWorkspacePackages: true
shellEmulator: true

packages:
  - 'apps/*'
  - 'apps/extension/browser/*'
  - 'apps/extension/desktop/*'
  - 'packages/*'

catalog:
  '@sveltejs/vite-plugin-svelte': ^6.2.1
  '@tsconfig/svelte': ^5.0.8
  '@types/vscode-webview': ^1.57.5
  svelte: ^5.56.0
  vite: ^8.0.16
  vscode-languageclient: ^10.0.0
  vscode-languageserver: ^9.0.1

allowBuilds:
  '@playwright/browser-chromium': true
  '@vscode/vsce-sign': true
  esbuild: true
  keytar: true
  sharp: true
